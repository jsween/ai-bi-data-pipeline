name: Data Quality Checks

on:
  schedule:
    # Runs once a month, at 06:00 UTC on the 1st
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

jobs:
  run-quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > "${RUNNER_TEMP}/gcp-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp-key.json" >> "$GITHUB_ENV"

      - name: Run quality checks
        run: python pipelines/quality/run_quality_checks.py